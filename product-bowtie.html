 <script>
  // JavaScript to update price

document.querySelectorAll('.option-buttons button').forEach(button => {
  if (localStorage.getItem('activeButton') === button.dataset.price) {
    button.classList.add('active');
    document.querySelector('.price').innerText = `$${button.dataset.price} CAD`;
  }

  button.addEventListener('click', function() {
    localStorage.setItem('activeButton', this.dataset.price);
    const newPrice = this.dataset.price;
    if (newPrice) {
      document.querySelector('.price').innerText = `$${newPrice} CAD`;
    } else {
       document.querySelector('.price').innerText = 'Price available upon request';
    }
    document.querySelector('.option-buttons button.active')?.classList.remove('active');
    this.classList.add('active');
  });
});
</script>

 <script>
const buttons = document.querySelectorAll('.color-button');
buttons.forEach(button => {
  button.addEventListener('click', function() {
    // Remove 'active' class from all buttons
    buttons.forEach(btn => btn.classList.remove('active'));

    // Add 'active' class to the clicked button
    this.classList.add('active');
  });
});


</script>
